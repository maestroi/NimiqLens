name: Build and push container images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nimlens-backend:latest
            ghcr.io/${{ github.repository_owner }}/nimlens-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # VITE_API_BASE_URL is read from a repo variable (Settings > Secrets and
      # variables > Actions > Variables) so the real backend URL doesn't need
      # to live in this file. Leave it unset for a relative/same-origin build.
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/nimlens-frontend:latest
            ghcr.io/${{ github.repository_owner }}/nimlens-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
