services:
  backend:
    build: ./backend
    ports:
      - "8787:8787"
    environment:
      - PORT=8787
      - COINGECKO_API_BASE=https://api.coingecko.com/api/v3
      - NIMIQ_RPC_URL=https://rpc-mainnet.nimiqscan.com
      - ALLOWED_ORIGIN=*

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8787
    ports:
      - "8080:80"
    depends_on:
      - backend
